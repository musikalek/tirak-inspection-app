<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspector Tirak LE501 - Andamios Panamá</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #0f1419;
            color: #e0e6ed;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 810px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
        }
        
        header {
            background: #1a2332;
            border-bottom: 1px solid #2a3f5f;
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #4db8ff;
            margin-bottom: 4px;
        }
        
        .subtitle {
            font-size: 11px;
            color: #6a8aaa;
            letter-spacing: 1px;
        }
        
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
        }
        
        .nav-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 16px;
            border: 1px solid #2a5a8a;
            background: #0d2847;
            color: #4db8ff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s;
            min-height: 44px;
            touch-action: manipulation;
        }
        
        button:active {
            background: #1a3f5f;
        }
        
        button.active {
            background: #1a5a8a;
            border-color: #4db8ff;
        }
        
        .card {
            background: #1a2332;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-size: 12px;
            color: #6a8aaa;
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            background: #0d1f33;
            border: 1px solid #2a3f5f;
            color: #e0e6ed;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 12px;
            min-height: 44px;
        }
        
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .check-group {
            background: #0d1f33;
            border-left: 3px solid #2a5a8a;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
        }
        
        .check-label {
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }
        
        .button-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .button-group button {
            flex: 1;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }
